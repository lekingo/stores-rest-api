services:
  web:
    build: .
    ports:
      - "5000:80"
    volumes:
      - .:/app
    depends_on:
      - db
    env_file:
      - ./.env
  db:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=mypgpassword
      - POSTGRES_DB=mypdbapp
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
volumes:
  postgres_data: